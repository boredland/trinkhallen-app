# Lefthook config — `bun install` runs `lefthook install` automatically
# (see the "prepare" script in package.json) so checked-out clones get
# the git hooks wired up without an extra setup step.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bunx tsc --noEmit

    # Run the unit tests on every commit. `bun test` discovers *.test.ts
    # files anywhere under src/. Fast enough (~50ms) that we don't gate it
    # on which files changed — a passing suite per commit is worth more
    # than the saved ms.
    - name: test
      glob: "*.{ts,tsx}"
      run: bun test
