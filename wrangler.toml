#:schema node_modules/wrangler/config-schema.json
name = "trinkhallen-app"
main = "./dist/index.js"
compatibility_date = "2026-01-15"

# Workers Assets — serves /dist/static built by Vite
[assets]
directory = "./dist/static"
binding = "ASSETS"

# Production environment
[[d1_databases]]
binding = "DB"
database_name = "trinkhallen-prod"
database_id = "27575e60-47dc-4552-ba98-15db77d6d4c2"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "TILES"
bucket_name = "trinkhallen-tiles"

# Cloudflare Email Routing outbound binding.
# Operator setup:
#   1. Enable Email Routing for trinkhallen.app in the Cloudflare dashboard.
#   2. Verify feedback@trinkhallen.app as a destination address (Email
#      Routing → Destination addresses → Add → click verification email).
#   3. DKIM is auto-managed by Cloudflare; SPF/DMARC records are added when
#      Email Routing is enabled.
# Without those steps, env.EMAIL.send() will return 5xx.
[[send_email]]
name = "EMAIL"

[vars]
PUBLIC_ORIGIN = "https://trinkhallen.app"

# Secrets (set via `wrangler secret put`):
#   SESSION_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY, GITHUB_APP_INSTALLATION_ID,
#   GITHUB_WEBHOOK_SECRET

[[routes]]
pattern = "trinkhallen.app"
custom_domain = true

[observability.logs]
enabled = true

# Local dev: D1 + R2 are emulated via Miniflare; secrets read from .dev.vars
[env.local]
[env.local.vars]
PUBLIC_ORIGIN = "http://localhost:8787"
