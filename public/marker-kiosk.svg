<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="24" height="32">
  <!-- Frankfurt Wasserhäuschen silhouette: cylindrical kiosk with the
       iconic wide saucer roof. Pink fill, warm-white stroke for
       readability on both light and dark basemaps. MapLibre
       `icon-anchor: bottom` puts the body's footing on the GPS point. -->
  <!-- Cylindrical body -->
  <rect x="6" y="13" width="12" height="18"
        fill="#FF2D6F" stroke="#F5F2EC" stroke-width="1.2"
        stroke-linejoin="round" stroke-linecap="round" />
  <!-- Saucer roof — wide brim, overhangs the body by ~50% on each side -->
  <ellipse cx="12" cy="10" rx="11" ry="3.5"
           fill="#FF2D6F" stroke="#F5F2EC" stroke-width="1.2" />
  <!-- Serving-window slot in the front of the cylinder -->
  <rect x="8.5" y="19" width="7" height="3.5" fill="#0A0A0A" />
</svg>
