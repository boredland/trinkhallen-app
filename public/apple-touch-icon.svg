<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#0A0A0A"/>
  <!-- Frankfurt Wasserhäuschen, home-screen scale. Plinth + cylindrical
       body + saucer roof + cupola lantern + two front windows. The body
       carries a few vertical paneling lines that imply the round shape
       you see in person; window mullion bars do the same. -->
  <!-- Plinth -->
  <rect x="18" y="144" width="144" height="22" rx="3"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="5" stroke-linejoin="round" />
  <!-- Body -->
  <rect x="34" y="70" width="112" height="78"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="5" stroke-linejoin="round" />
  <!-- Body paneling — subtle vertical seams to read as cylindrical -->
  <g stroke="#FFD93D" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <line x1="48" y1="78" x2="48" y2="142"/>
    <line x1="132" y1="78" x2="132" y2="142"/>
  </g>
  <!-- Saucer roof -->
  <ellipse cx="90" cy="55" rx="84" ry="20"
           fill="#FF2D6F" stroke="#FFD93D" stroke-width="5" />
  <!-- Support post -->
  <rect x="83" y="24" width="14" height="14"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="4" stroke-linejoin="round" />
  <!-- Cap / cupola lantern -->
  <rect x="70" y="8" width="40" height="18" rx="3"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="4" stroke-linejoin="round" />
  <!-- Two front windows -->
  <rect x="48" y="88" width="36" height="42" fill="#0A0A0A" />
  <rect x="96" y="88" width="36" height="42" fill="#0A0A0A" />
  <!-- Window mullions — subtle, only visible at this size -->
  <g stroke="#FFD93D" stroke-width="2.5">
    <line x1="66" y1="88" x2="66" y2="130"/>
    <line x1="114" y1="88" x2="114" y2="130"/>
  </g>
</svg>
