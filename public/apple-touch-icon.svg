<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#0A0A0A"/>
  <!-- Frankfurt Wasserhäuschen at home-screen scale. Sign on top of the
       saucer adds the recognisable detail you'd see in the real thing. -->
  <!-- Sign + support post -->
  <rect x="64" y="18" width="52" height="22" rx="3"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="3"
        stroke-linejoin="round" />
  <rect x="87" y="40" width="6" height="6" fill="#FFD93D" />
  <!-- Cylindrical body -->
  <rect x="38" y="78" width="104" height="80"
        fill="#FF2D6F" stroke="#FFD93D" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round" />
  <!-- Saucer roof -->
  <ellipse cx="90" cy="58" rx="84" ry="20"
           fill="#FF2D6F" stroke="#FFD93D" stroke-width="5" />
  <!-- Serving window -->
  <rect x="60" y="108" width="60" height="20" fill="#0A0A0A" />
</svg>
