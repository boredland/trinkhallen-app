<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="24" height="32">
  <!-- Fuel pump silhouette for gas-station kiosks. Same pink fill +
       warm-white stroke as marker-kiosk.svg so the two read as a set.
       MapLibre `icon-anchor: bottom` puts the pump's footing on the
       GPS point. -->
  <!-- Pump body — tall rounded-top column -->
  <rect x="3.5" y="6" width="12" height="25" rx="1.5"
        fill="#FF2D6F" stroke="#F5F2EC" stroke-width="1.2"
        stroke-linejoin="round" stroke-linecap="round" />
  <!-- Display window (digital readout) -->
  <rect x="5.5" y="9" width="8" height="4" fill="#0A0A0A" />
  <!-- Hose + nozzle (L-bracket reaching out the right side) -->
  <path d="M15.5 16 L19.5 16 L19.5 25.5 L18 25.5 L18 17.5 L15.5 17.5 Z"
        fill="#FF2D6F" stroke="#F5F2EC" stroke-width="1.1"
        stroke-linejoin="round" stroke-linecap="round" />
</svg>
